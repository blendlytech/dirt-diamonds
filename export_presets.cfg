; Phase 11e — the project's first export presets (steam_publishing_ship_it.md §3.3).
; Two presets: Windows x86_64 + Linux x86_64 (Steam Deck), per BUILD_PLAN §11 (no macOS).
;
; Load-bearing: the include_filter carries the FOUR non-resource file families the
; game reads via FileAccess out of the .pck — SchemaDefinitions.sql (the schema DDL),
; Assets/Narrative/**.json (gritty-event content + the contact registry),
; Assets/Data/Items/items.json (HS-3 marketplace catalog), and
; Assets/Data/Schools/schools.json (HS team branding + art paths) — see the four
; *ResourcePath consts at the top of GameManager.cs; keep this list in lockstep with
; them. An export without any one of them boots to a load throw. Patterns are
; path-scoped on purpose: a bare *.json would sweep the Tools/* obj/ NuGet artifacts
; (project.assets.json, *.deps.json) into the .pck.
;
; The exclude_filter is equally load-bearing: Godot treats .cs and .json as
; resource types, so "all_resources" would otherwise pack the whole Tools/**
; harness tree (sources + bin/obj NuGet artifacts whose sourcelink.json carries
; local absolute paths) and .mcp.json into the shipped depot — observed on the
; first 11e export, fixed here. Game .cs entries stay in the pck (scene script
; resolution wants the paths) but ship content-stripped via
; dotnet/include_scripts_content=false.
;
; The Steam native libs (steam_api64.dll / libsteam_api.so) do NOT ride the .pck —
; they reach the build via the .csproj <None> copy items into the dotnet publish
; output (validate_steamworks_native gates that wiring).
;
; This file is committed (Godot 4 keeps secrets in export_credentials.cfg, which
; stays git-ignored). Build/ output paths are git-ignored.

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter="*Assets/Data/Database/SchemaDefinitions.sql, *Assets/Narrative/*.json, *Assets/Data/Items/*.json, *Assets/Data/Schools/*.json"
exclude_filter="Tools/*, .mcp.json"
export_path="Build/Windows/DirtAndDiamonds.exe"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=2
binary_format/embed_pck=false
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
binary_format/architecture="x86_64"
codesign/enable=false
application/modify_resources=false
application/icon=""
application/console_wrapper_icon=""
application/icon_interpolation=4
application/file_version=""
application/product_version=""
application/company_name=""
application/product_name=""
application/file_description=""
application/copyright=""
application/trademarks=""
application/export_angle=0
application/export_d3d12=0
application/d3d12_agility_sdk_multiarch=true
ssh_remote_deploy/enabled=false
dotnet/include_scripts_content=false
dotnet/include_debug_symbols=true
dotnet/embed_build_outputs=false

